<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATM-travel.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--bg:#05070d;--panel:#0a0f1a;--line:#1a2436;--text:#e7edf5;--muted:#8b9bb4;--muted-2:#5a6a82;--cyan:#4fd7e0;--cyan-dim:#1f6b72;}
  *{box-sizing:border-box;} html,body{margin:0;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;line-height:1.6;}
  a{color:var(--cyan);text-decoration:none;} a:hover{text-decoration:underline;}
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 70px;}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;flex-wrap:wrap;}
  .logo{font-weight:700;} .logo b{color:var(--cyan);}
  .back{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);}
  .langs{display:flex;gap:8px;flex-wrap:wrap;font-family:'Space Mono',monospace;font-size:12px;}
  .langs a{color:var(--muted);text-transform:uppercase;} .langs a.on{color:var(--cyan);border-bottom:1px solid var(--cyan);}
  h1{font-size:23px;margin:18px 0 6px;}
  .upd{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted-2);margin-bottom:18px;}
  .doc h2{font-size:15px;color:var(--cyan);margin:20px 0 4px;}
  .doc p{color:#cdd7e6;margin:0 0 10px;}
  .nav{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 20px;font-family:'Space Mono',monospace;font-size:13px;}
  footer{border-top:1px solid var(--line);margin-top:34px;padding-top:16px;color:var(--muted);font-size:12px;line-height:1.5;}
  footer .n{color:var(--text);} footer .mono{font-family:'Space Mono',monospace;}
</style>
  <script nowprocket data-noptimize="1" data-cfasync="false" data-wpfc-render="false" seraph-accel-crit="1" data-no-defer="1">
  (function () {
      var script = document.createElement("script");
      script.async = 1;
      script.src = 'https://tpembars.com/NTQ2ODMx.js?t=546831';
      document.head.appendChild(script);
  })();
</script>
</head>
<body>
<div class="wrap">
  <header>
    <a class="logo" href="/">ATM<b>·</b>travel</a>
    <div class="langs" id="langs"></div>
  </header>
  <div class="nav" id="docnav"></div>

  <h1 id="title">…</h1>
  <div class="upd" id="upd"></div>
  <div class="doc" id="body"></div>

  <footer id="foot"></footer>
</div>

<script>
(function(){
  var API=location.origin;
  var LANGS=['uk','ru','en','pl','fr','de','ja','it','pt','es'];
  var qs=new URLSearchParams(location.search);
  var parts=location.pathname.split('/').filter(Boolean); // ['legal','privacy']
  var doc=(parts[1]||'privacy').toLowerCase();
  function cookieLang(){var m=document.cookie.match(/(?:^|;\s*)locale=([a-z-]+)/i);return m?m[1]:null;}
  var lang=(qs.get('lang')||cookieLang()||'uk').toLowerCase();

  var NAV={
    uk:{privacy:'Політика конфіденційності',terms:'Угода користувача',refund:'Політика повернення / доставки',back:'← На головну'},
    ru:{privacy:'Политика конфиденциальности',terms:'Пользовательское соглашение',refund:'Политика возврата / доставки',back:'← На главную'},
    en:{privacy:'Privacy Policy',terms:'Terms of Use',refund:'Refund & Delivery',back:'← Home'},
    pl:{privacy:'Polityka prywatności',terms:'Regulamin',refund:'Zwroty i dostawa',back:'← Strona główna'},
    fr:{privacy:'Confidentialité',terms:'Conditions',refund:'Retours et livraison',back:'← Accueil'},
    ja:{privacy:'プライバシー',terms:'利用規約',refund:'返金・配送',back:'← ホーム'},
    de:{privacy:'Datenschutz',terms:'Nutzungsbedingungen',refund:'Rückgabe & Lieferung',back:'← Startseite'},
    it:{privacy:'Privacy',terms:'Termini',refund:'Rimborsi e consegna',back:'← Home'},
    pt:{privacy:'Privacidade',terms:'Termos',refund:'Reembolsos e entrega',back:'← Início'},
    es:{privacy:'Privacidad',terms:'Términos',refund:'Reembolsos y entrega',back:'← Inicio'}
  };
  var nav=NAV[lang]||NAV.en;

  // language switcher
  var lc=document.getElementById('langs');
  LANGS.forEach(function(l){var a=document.createElement('a');a.href='/legal/'+doc+'?lang='+l;a.textContent=l;if(l===lang)a.className='on';lc.appendChild(a);});
  // doc nav
  var dn=document.getElementById('docnav');
  ['privacy','terms','refund'].forEach(function(d){var a=document.createElement('a');a.href='/legal/'+d+'?lang='+lang;a.textContent=nav[d];if(d===doc)a.style.color='var(--cyan)';dn.appendChild(a);});

  function render(data){
    document.documentElement.lang=data.locale||lang;
    document.getElementById('title').textContent=data.title||'';
    document.title=(data.title||'')+' · ATM-travel.org';
    document.getElementById('body').innerHTML=data.html||'';
    document.getElementById('upd').textContent=(data.updatedAt?('ver. '+data.updatedAt):'');
    var e=data.entity||{};
    document.getElementById('foot').innerHTML=
      '<div class="n">'+(e.name||'')+' · <span class="mono">код ЄДРПОУ '+(e.edrpou||'')+'</span></div>'+
      '<div>'+(e.address||'')+'</div>'+
      '<div>'+(nav===NAV.uk?'тел.':'tel.')+' <a href="'+(e.phoneHref||'#')+'">'+(e.phone||'')+'</a> · <a href="'+(e.whatsapp||'#')+'" target="_blank" rel="noopener">WhatsApp</a></div>'+
      '<div style="margin-top:8px"><a href="/">'+nav.back+'</a></div>';
  }

  fetch(API+'/api/legal/'+encodeURIComponent(doc)+'?lang='+encodeURIComponent(lang),{credentials:'include'})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){ if(d&&!d.error) render(d); else document.getElementById('title').textContent='404'; })
    .catch(function(){ document.getElementById('title').textContent='—'; });
})();
</script>
</body>
</html>
