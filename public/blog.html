<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Блог о путешествиях · ATM-travel.org</title>
<meta name="description" content="Тревел-гайды, советы, обзоры и истории о направлениях — оригинальные статьи ATM-travel.">
<link rel="canonical" href="/blog">
<link rel="alternate" type="application/rss+xml" title="Блог ATM-travel (RSS)" href="/blog/rss.xml">
<style>
  :root{--bg:#070c12;--panel:#0b131c;--line:#1b2734;--text:#e7eef4;--muted:#7d8b99;--cyan:#4fd7e0;--cyan-dim:#256e74;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:16px/1.55 system-ui,-apple-system,'Segoe UI',sans-serif;}
  .wrap{max-width:960px;margin:0 auto;padding:22px 16px 70px;}
  .top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .brand{font-weight:800;color:var(--cyan);letter-spacing:.3px;} .sub{color:var(--muted);font-size:13px;}
  a.plain{color:var(--cyan);text-decoration:none;} a.plain:hover{text-decoration:underline;}
  .nav{display:flex;gap:16px;flex-wrap:wrap;}
  h1{font-size:22px;margin:18px 0 4px;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 4px;}
  .filters button{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:999px;
    padding:6px 14px;font:inherit;font-size:13px;cursor:pointer;font-family:ui-monospace,'Space Mono',monospace;transition:all .15s;}
  .filters button:hover{border-color:var(--cyan-dim);color:var(--text);}
  .filters button.on{background:#0c1726;border-color:var(--cyan);color:var(--cyan);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:16px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;text-decoration:none;
    color:inherit;display:flex;flex-direction:column;transition:border-color .15s,transform .15s;}
  .card:hover{border-color:var(--cyan-dim);transform:translateY(-2px);}
  .card .ph{aspect-ratio:16/10;background:#0a0f1c center/cover no-repeat;border-bottom:1px solid var(--line);}
  .card .b{padding:12px 14px 16px;}
  .card .tag{font-family:ui-monospace,'Space Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--cyan);}
  .card h3{font-size:16px;margin:7px 0 6px;line-height:1.3;}
  .card p{margin:0;color:var(--muted);font-size:13px;}
  .card .dt{margin-top:9px;font-family:ui-monospace,'Space Mono',monospace;font-size:11px;color:#5c6b7a;}
  .empty{color:var(--muted);padding:30px 4px;}
  .foot{color:var(--muted);font-size:12px;margin-top:26px;border-top:1px solid var(--line);padding-top:12px;}
  .foot a{color:var(--cyan);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><span class="brand">ATM·travel</span> <span class="sub">· блог о путешествиях</span></div>
    <nav class="nav">
      <a class="plain" href="/hot-tours">🔥 Горящие туры</a>
      <a class="plain" href="/">← на главную</a>
    </nav>
  </div>
  <h1>Блог о путешествиях</h1>
  <div class="sub">Тревел-гайды, советы, обзоры и истории о направлениях.</div>
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"><div class="empty">Загрузка…</div></div>
  <div class="foot">© ATM-travel · оригинальные тревел-статьи · <a href="/blog/rss.xml">RSS</a></div>
</div>
<script>
(function(){
  var THEMES=[['','Все'],['guide','Гайды'],['tips','Советы'],['review','Обзоры'],['story','Истории']];
  var all=[], active='';
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function dm(d){ if(!d) return ''; try{return new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});}catch(e){return '';} }
  function renderFilters(){
    document.getElementById('filters').innerHTML=THEMES.map(function(t){
      return '<button data-t="'+t[0]+'" class="'+(active===t[0]?'on':'')+'">'+t[1]+'</button>';
    }).join('');
  }
  function render(){
    var box=document.getElementById('grid');
    var list=active?all.filter(function(a){return a.theme===active;}):all;
    if(!list.length){ box.innerHTML='<div class="empty">Пока нет статей. Загляните позже.</div>'; return; }
    box.innerHTML=list.map(function(a){
      var ph=a.image?('style="background-image:url('+esc(a.image)+')"'):'';
      return '<a class="card" href="/blog/'+encodeURIComponent(a.slug)+'">'+
        '<div class="ph" '+ph+'></div>'+
        '<div class="b"><div class="tag">'+esc(a.themeLabel||a.theme)+' \u00B7 '+esc(a.topic)+'</div>'+
        '<h3>'+esc(a.h1)+'</h3><p>'+esc(a.meta||'')+'</p>'+
        '<div class="dt">'+dm(a.publishedAt)+'</div></div></a>';
    }).join('');
  }
  document.getElementById('filters').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b) return; active=b.getAttribute('data-t'); renderFilters(); render();
  });
  renderFilters();
  fetch('/api/blog/list').then(function(r){return r.ok?r.json():{articles:[]};}).then(function(j){
    all=(j&&j.articles)||[]; render();
  }).catch(function(){ document.getElementById('grid').innerHTML='<div class="empty">Не удалось загрузить.</div>'; });
})();
</script>
</body>
</html>
