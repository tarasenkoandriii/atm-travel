<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auto-reel · ATM-travel.org</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--bg:#05070d;--panel:#0a0f1a;--line:#1a2436;--text:#e7edf5;--muted:#8b9bb4;--cyan:#4fd7e0;--cyan-dim:#1f6b72;--amber:#f2b64c;}
  *{box-sizing:border-box;} html,body{margin:0;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;}
  .wrap{max-width:900px;margin:0 auto;padding:18px 16px 60px;}
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .logo{font-weight:700;} .logo b{color:var(--cyan);} .sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
  a{color:var(--cyan);text-decoration:none;}
  #stage{position:absolute;left:-9999px;top:0;} /* globe renders offscreen for the intro capture */
  .panel{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:14px;margin-top:14px;}
  label{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  input,textarea{width:100%;background:#0c1420;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:9px;font:inherit;margin-top:4px;}
  textarea{min-height:70px;font-family:'Space Mono',monospace;font-size:12px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:6px;}
  .btn{border:1px solid var(--cyan-dim);background:linear-gradient(180deg,#0e2730,#0c1a20);color:var(--cyan);font:inherit;font-weight:700;border-radius:11px;padding:13px 18px;cursor:pointer;} .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .status{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-top:12px;min-height:18px;}
  .log{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted-2,#5a6a82);background:#070b12;border:1px solid var(--line);border-radius:8px;padding:8px;height:120px;overflow:auto;margin-top:8px;white-space:pre-wrap;}
  .bar{height:6px;background:#0c1420;border-radius:4px;overflow:hidden;margin-top:8px;} .bar>i{display:block;height:100%;width:0;background:var(--cyan);transition:width .2s;}
  .results{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:14px;}
  .rcard{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#0c1420;} .rcard video{width:100%;display:block;background:#000;}
  .rc-b{padding:9px 11px;display:flex;justify-content:space-between;align-items:center;gap:8px;} .rc-b .fmt{font-family:'Space Mono',monospace;font-size:12px;color:var(--cyan);}
  .muted{color:var(--muted);font-size:12px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="logo" href="/">ATM<b>·</b>travel</a>
    <div class="sub">auto-reel · ffmpeg.wasm montage (1080p, in-browser)</div>
  </header>

  <div id="stage"><div id="globeHost"></div></div>

  <div class="panel">
    <div class="grid">
      <div><label>Lat</label><input id="lat" type="number" step="0.0001"></div>
      <div><label>Lng</label><input id="lng" type="number" step="0.0001"></div>
      <div><label>Title</label><input id="title" placeholder="Хургада, Египет"></div>
      <div><label>BPM</label><input id="bpm" type="number" value="120"></div>
      <div><label>FPS</label><input id="fps" type="number" value="30"></div>
    </div>
    <div style="margin-top:10px"><label>Manifest URL (optional — иначе собираем из полей)</label><input id="manifestUrl" placeholder="https://…/manifest.json"></div>
    <div style="margin-top:10px"><label>Clips (по одному URL .mp4 в строке · нарезка между глобусом и live-камерой)</label><textarea id="clips" placeholder="https://.../aerial-beach.mp4&#10;https://.../coral-reef.mp4&#10;https://.../golden-hour.mp4"></textarea></div>
    <div class="grid">
      <div><label>Music URL</label><input id="music" placeholder="https://.../track.mp3"></div>
      <div><label>Overlay .webm (alpha)</label><input id="overlay" placeholder="https://.../overlay.webm"></div>
      <div><label>Live-cam clip .mp4</label><input id="livecam" placeholder="https://.../cam.mp4"></div>
    </div>
    <div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <button class="btn" id="go">▶ Собрать 3 ролика</button>
      <span class="muted">1080p · x264 · всё в браузере</span>
    </div>
    <div class="status" id="status"></div>
    <div class="bar"><i id="prog"></i></div>
    <div class="log" id="log"></div>
    <div class="results" id="results"></div>
  </div>

  <p class="muted" style="margin-top:12px">Порядок: <b>intro (глобус)</b> → нарезка сток-клипов по битам → <b>live-камера</b>, поверх — overlay (погода/оффер) и музыка. ffmpeg.wasm жмёт в x264/mp4, результат — в Vercel Blob.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
<script type="module">
import { FFmpeg } from 'https://esm.sh/@ffmpeg/ffmpeg@0.12.10';
import { fetchFile, toBlobURL } from 'https://esm.sh/@ffmpeg/util@0.12.1';
import { validateManifest, checkBeatAlignment, buildFilterComplex, buildDefaultManifest } from '/reel.manifest.mjs';

const $ = s => document.querySelector(s);
const qs = new URLSearchParams(location.search);
const log = m => { const el = $('#log'); el.textContent += m + '\n'; el.scrollTop = el.scrollHeight; };
const setStatus = m => $('#status').textContent = m;
const setProg = p => $('#prog').style.width = Math.round(p * 100) + '%';
const num = (v, d) => { const n = parseFloat(v); return isNaN(n) ? d : n; };

const FORMATS = [{ name: '9:16', w: 1080, h: 1920 }, { name: '4:5', w: 1080, h: 1350 }, { name: '16:9', w: 1920, h: 1080 }];
// Clips passed from /cine: ?clipset=<id> (fetched in init) or ?clips= (base64-JSON / comma URLs).
let presetClips = (() => {
  const cp = qs.get('clips'); if (!cp) return [];
  try { const j = JSON.parse(decodeURIComponent(escape(atob(cp)))); if (Array.isArray(j)) return j; } catch (e) {}
  return cp.split(',').map(u => u.trim()).filter(Boolean).map(u => ({ url: u }));
})();
const MIME = (() => { const c = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']; for (const m of c) if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m; return 'video/webm'; })();

// prefill from params
['lat', 'lng', 'title', 'bpm', 'fps', 'music', 'overlay', 'livecam'].forEach(k => { if (qs.get(k)) $('#' + k).value = qs.get(k); });
if (qs.get('manifest')) $('#manifestUrl').value = qs.get('manifest');
if (qs.get('clips')) $('#clips').value = qs.get('clips').split(',').join('\n');

// ── globe (offscreen) for the intro segment ──
const host = $('#globeHost');
const G = Globe({ rendererConfig: { preserveDrawingBuffer: true, antialias: true } })(host)
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .showAtmosphere(true).atmosphereColor('#4fd7e0').atmosphereAltitude(0.18)
  .ringColor(() => '#4fd7e0').ringMaxRadius(6).ringPropagationSpeed(3).ringRepeatPeriod(700);
G.controls().enabled = false;
const gc = () => host.querySelector('canvas');
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

// Record a globe fly-to as a WebM blob at a given size/duration — this is the manifest's `intro`.
function recordIntro(w, h, seconds, lat, lng) {
  return new Promise(resolve => {
    G.width(w); G.height(h); host.style.width = w + 'px'; host.style.height = h + 'px';
    G.ringsData([{ lat, lng }]).pointsData([{ lat, lng }]).pointColor(() => '#f2b64c').pointAltitude(0.01).pointRadius(0.5);
    const stream = gc().captureStream(30);
    const rec = new MediaRecorder(stream, { mimeType: MIME, videoBitsPerSecond: 10_000_000 });
    const chunks = []; rec.ondataavailable = e => e.data.size && chunks.push(e.data);
    rec.onstop = () => resolve(new Blob(chunks, { type: 'video/webm' }));
    const start = { lat: lat - 8, lng: lng - 35, altitude: 2.9 }, end = { lat, lng, altitude: 0.55 };
    const t0 = performance.now(), dur = seconds * 1000;
    G.pointOfView(start, 0); rec.start();
    (function loop() {
      const t = Math.min(1, (performance.now() - t0) / dur), e = easeInOut(t);
      G.pointOfView({ lat: start.lat + (end.lat - start.lat) * e, lng: start.lng + (end.lng - start.lng) * e, altitude: start.altitude + (end.altitude - start.altitude) * e }, 0);
      if (t < 1) requestAnimationFrame(loop); else setTimeout(() => rec.stop(), 120);
    })();
  });
}

// ── asset fetch (direct, else via server CORS proxy) ──
async function fetchBytes(url) {
  try { const r = await fetch(url); if (!r.ok) throw 0; return new Uint8Array(await r.arrayBuffer()); }
  catch (e) {
    const r = await fetch('/api/reels/proxy?url=' + encodeURIComponent(url));
    if (!r.ok) throw new Error('asset fetch failed: ' + url);
    return new Uint8Array(await r.arrayBuffer());
  }
}
const extOf = (url, def) => { const m = /\.([a-z0-9]{2,4})(?:\?|$)/i.exec(url || ''); return m ? m[1].toLowerCase() : def; };

// ── ffmpeg.wasm ──
// ffmpeg assets are built once (blob URLs), then a FRESH instance is created per format and
// terminated after — this keeps the wasm heap from growing across the 3 renders.
let ffAssets = null;
async function ffAssetsReady() {
  if (ffAssets) return ffAssets;
  setStatus('Загрузка ffmpeg.wasm…');
  const base = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
  const workerURL = 'https://esm.sh/@ffmpeg/ffmpeg@0.12.10/es2022/worker.js';
  ffAssets = {
    classWorkerURL: await toBlobURL(workerURL, 'text/javascript'),
    coreURL: await toBlobURL(`${base}/ffmpeg-core.js`, 'text/javascript'),
    wasmURL: await toBlobURL(`${base}/ffmpeg-core.wasm`, 'application/wasm'),
  };
  return ffAssets;
}
async function newFF() {
  const a = await ffAssetsReady();
  const f = new FFmpeg();
  f.on('log', ({ message }) => { if (/frame=|error|Error/i.test(message)) log(message); });
  await f.load({ classWorkerURL: a.classWorkerURL, coreURL: a.coreURL, wasmURL: a.wasmURL });
  return f;
}

// Build a manifest from the form (or load provided URL). introSecOverride = reuse cine flight length.
async function getManifest(introSecOverride) {
  const url = $('#manifestUrl').value.trim();
  if (url) { const m = await fetch(url).then(r => r.json()); return m; }
  const lat = num($('#lat').value, NaN), lng = num($('#lng').value, NaN);
  if (isNaN(lat) || isNaN(lng)) throw new Error('нужны Lat/Lng или Manifest URL');
  let clips = $('#clips').value.split('\n').map(s => s.trim()).filter(Boolean).map(u => ({ url: u }));
  // Clips passed from /cine take priority over the textarea / auto-source.
  if (presetClips.length) {
    clips = presetClips.map(c => ({ url: c.url, provider: c.provider, id: c.id, attribution: c.attribution, tags: c.tags }));
    log('клипы из cine-подборки: ' + clips.length);
    clips.forEach(c => c.attribution && log('  © ' + c.attribution));
  }
  // Auto-source B-roll if none pasted and a provider key is configured.
  if (!clips.length) {
    const q = (qs.get('q') || $('#title').value || '').trim();
    try {
      const j = await fetch('/api/reels/clips?n=4&orientation=landscape&q=' + encodeURIComponent(q)).then(r => r.json());
      if (j && j.clips && j.clips.length) {
        clips = j.clips.map(c => ({ url: c.url, provider: c.provider, id: c.id, attribution: c.attribution, tags: c.tags }));
        log('авто-клипы: ' + clips.length + ' · ' + (j.provider || '') + ' · запрос: ' + (j.query || '—'));
        clips.forEach(c => c.attribution && log('  © ' + c.attribution));
      } else if (j && !j.provider) log('авто-источник клипов не настроен (нет PEXELS/PIXABAY ключа)');
    } catch (e) { log('авто-клипы недоступны: ' + (e.message || e)); }
  }
  const music = $('#music').value.trim(), overlay = $('#overlay').value.trim(), livecamUrl = $('#livecam').value.trim();
  return buildDefaultManifest({
    destination: { id: (qs.get('cam') || 'geo'), name: $('#title').value.trim() || 'Destination', coords: { lat, lng } },
    formats: FORMATS, fps: num($('#fps').value, 30), bpm: num($('#bpm').value, 120),
    music, overlay, clips,
    introSec: introSecOverride || undefined,
    livecam: livecamUrl ? { id: qs.get('cam') || 'cam', url: livecamUrl } : null,
  });
}

// Assemble one crop with ffmpeg.wasm. Returns Blob(mp4).
// Render a credit strip (author attributions) as a transparent PNG for a given format size.
function makeCreditPng(w, h, text) {
  return new Promise(res => {
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const x = c.getContext('2d');
    const strip = Math.round(h * 0.10);
    const g = x.createLinearGradient(0, h - strip, 0, h); g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.5)');
    x.fillStyle = g; x.fillRect(0, h - strip, w, strip);
    x.fillStyle = 'rgba(231,237,245,0.92)'; x.font = Math.round(w * 0.019) + "px 'Space Mono', monospace"; x.textBaseline = 'alphabetic';
    x.fillText(text, Math.round(w * 0.04), h - Math.round(w * 0.03));
    c.toBlob(async b => res(new Uint8Array(await b.arrayBuffer())), 'image/png');
  });
}

async function renderFormat(ff, m, fmt, introBlob, assetCache, creditText, introExt) {
  // target a size that fits Vercel's ~4.5MB server-upload limit
  const dur = (m.timeline[m.timeline.length - 1].outEnd) || 10;
  const kbps = Math.max(800, Math.floor((4.2 * 1024 * 1024 * 8 / 1000) / dur) - 128);
  const g = buildFilterComplex(m, fmt.name, { lut: false, preset: 'veryfast', videoBitrate: kbps + 'k', bufsize: (kbps * 2) + 'k' });
  const files = [];
  for (let i = 0; i < m.timeline.length; i++) {
    const s = m.timeline[i];
    if (s.kind === 'intro') files.push({ name: `in${i}.${introExt || 'webm'}`, data: new Uint8Array(await introBlob.arrayBuffer()) });
    else { const url = s.source.url; const ext = extOf(url, 'mp4'); files.push({ name: `in${i}.${ext}`, data: await cached(assetCache, url) }); }
  }
  let idx = m.timeline.length;
  if (g.hasOverlay) { const url = m.overlay.source; files.push({ name: `in${idx}.${extOf(url, 'webm')}`, data: await cached(assetCache, url) }); idx++; }
  if (g.hasMusic) { const url = m.audio.track; files.push({ name: `in${idx}.${extOf(url, 'mp3')}`, data: await cached(assetCache, url) }); idx++; }

  for (const f of files) await ff.writeFile(f.name, f.data);

  const args = [];
  files.forEach(f => args.push('-i', f.name));
  let filter = g.filter, maps = g.maps;
  let hasCredit = false;
  if (creditText) {
    const credit = await makeCreditPng(fmt.w, fmt.h, creditText);
    await ff.writeFile('credit.png', credit);
    args.push('-loop', '1', '-framerate', String(m.render.fps), '-i', 'credit.png'); // index === g.nextIdx
    const introSeg = m.timeline.find(s => s.kind === 'intro');
    const creditEnd = introSeg ? introSeg.outEnd : 3;   // show credits only over the intro/first seconds
    filter += `;[${g.nextIdx}:v]format=rgba[cr];${g.outLabel}[cr]overlay=0:0:enable='between(t,0,${creditEnd})'[outc]`;
    maps = ['-map', '[outc]'].concat(g.hasMusic ? ['-map', `${g.musicIdx}:a`] : []);
    hasCredit = true;
  }
  args.push('-filter_complex', filter, ...maps, ...g.encode);
  if (hasCredit && !g.hasMusic) args.push('-shortest');
  args.push('-movflags', '+faststart', 'out.mp4');
  log('ffmpeg ' + fmt.name + ': ' + args.join(' '));
  await ff.exec(args);
  const data = await ff.readFile('out.mp4');
  for (const f of files) { try { await ff.deleteFile(f.name); } catch (e) {} }
  if (hasCredit) { try { await ff.deleteFile('credit.png'); } catch (e) {} }
  try { await ff.deleteFile('out.mp4'); } catch (e) {}
  return new Blob([data.buffer], { type: 'video/mp4' });
}
async function cached(cache, url) { if (!cache.has(url)) cache.set(url, await fetchBytes(url)); return cache.get(url); }

// ── upload to Blob + persist ──
function withTimeout(p, ms, label) {
  return Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout: ' + label)), ms))]);
}
// Upload one finished mp4 to Blob via the server (same-origin). Returns the public URL.
async function uploadOne(blob, fmt) {
  const LIMIT = 4.4 * 1024 * 1024;
  if (blob.size > LIMIT) throw new Error('файл ' + Math.round(blob.size / 1048576) + 'МБ > 4.4МБ');
  const name = 'reel/' + Date.now() + '-' + fmt.replace(':', 'x') + '.mp4';
  const res = await withTimeout(fetch('/api/cine/put?name=' + encodeURIComponent(name) + '&ct=video/mp4', {
    method: 'POST', headers: { 'Content-Type': 'video/mp4' }, body: blob,
  }).then(async r => { if (!r.ok) { let m = ''; try { m = (await r.json()).message || ''; } catch (e) {} throw new Error('put ' + r.status + (m ? ' — ' + m : '')); } return r.json(); }), 120000, 'put ' + fmt);
  return res.url;
}
function showCards(items) {
  $('#results').innerHTML = items.map(o => { const u = o.url || URL.createObjectURL(o.blob); const dl = o.url ? ' target="_blank"' : ' download="reel-' + o.fmt.replace(':', 'x') + '.mp4"'; return '<div class="rcard"><video src="' + u + '" controls muted loop playsinline></video><div class="rc-b"><span class="fmt">' + o.fmt + '</span><a class="btn" style="padding:7px 12px" href="' + u + '"' + dl + '>' + (o.url ? 'Открыть' : 'Скачать') + '</a></div></div>'; }).join('');
}

// ── run all (automatic) ──
async function run() {
  $('#go').disabled = true; $('#results').innerHTML = ''; $('#log').textContent = ''; setProg(0);
  try {
    setStatus('Готовим манифест…');
    // Stage-1 reuse: if ?cine=<id>, use the cine camera-flight (already in Blob) as the intro, and
    // make the intro/pre-clip duration equal the cine length everywhere.
    let cineData = null; const cineId = qs.get('cine');
    if (cineId) {
      try { cineData = await fetch('/api/cine/' + encodeURIComponent(cineId)).then(r => r.ok ? r.json() : null); } catch (e) {}
      if (cineData) log('интро из cine ' + cineId + ' · ' + cineData.durationSec + 's');
      else log('cine ' + cineId + ' не найден — интро запишется глобусом');
    }
    const m = await getManifest(cineData ? cineData.durationSec : null);
    const errs = validateManifest(m); if (errs.length) { setStatus('Манифест невалиден'); errs.forEach(log); $('#go').disabled = false; return; }
    const bad = checkBeatAlignment(m); if (bad.length) log('⚠ вне бита: ' + JSON.stringify(bad));
    const intro = m.timeline.find(s => s.kind === 'intro');
    const introSec = intro ? (intro.srcOut - intro.srcIn) : 2.5;
    const lat = m.destination.coords.lat, lng = m.destination.coords.lng;

    let cfg = { blobEnabled: false }; try { cfg = await fetch('/api/cine/config').then(r => r.json()); } catch (e) {}
    await ffAssetsReady();
    const cache = new Map();
    // author credits from clip attributions (Pexels/Pixabay require attribution)
    const attrs = [...new Set(m.timeline.filter(s => s.source && s.source.attribution).map(s => s.source.attribution))];
    const creditText = attrs.length ? ('Footage: ' + attrs.join('  ·  ')) : '';
    if (creditText) log('кредиты: ' + creditText);

    const items = []; let lastErr = ''; const n = m.render.formats.length;
    for (let fi = 0; fi < n; fi++) {
      const fmt = m.render.formats[fi];
      // intro: reuse cine flight (per-format) or record the globe
      let introBlob = null, introExt = 'webm';
      if (cineData) {
        const it = (cineData.items || []).find(x => x.format === fmt.name);
        if (it && it.url) {
          setStatus('Формат ' + fmt.name + ' — интро из cine…');
          try { introBlob = new Blob([await cached(cache, it.url)]); introExt = 'mp4'; cache.delete(it.url); }
          catch (e) { log('cine-интро ' + fmt.name + ': ' + (e.message || e)); }
        } else log('нет cine-клипа для ' + fmt.name + ' — запишу глобус');
      }
      if (!introBlob) { setStatus('Формат ' + fmt.name + ' — intro (глобус)…'); introBlob = await recordIntro(fmt.w, fmt.h, introSec, lat, lng); introExt = 'webm'; }

      // fresh ffmpeg per ratio → terminate after, so the wasm heap is freed between renders
      setStatus('Формат ' + fmt.name + ' (' + (fi + 1) + '/' + n + ') — монтаж ffmpeg…');
      const ff = await newFF();
      let blob;
      try { blob = await renderFormat(ff, m, fmt, introBlob, cache, creditText, introExt); }
      finally { try { ff.terminate(); } catch (e) {} }
      introBlob = null;

      // upload right away and drop the blob on success to keep tab memory low
      let url = null;
      if (cfg.blobEnabled) {
        setStatus('Формат ' + fmt.name + ' — загрузка…');
        try { url = await uploadOne(blob, fmt.name); } catch (e) { lastErr = String(e.message || e); console.warn('server put failed', fmt.name, e); }
      }
      items.push(url ? { fmt: fmt.name, url } : { fmt: fmt.name, blob });
      blob = null;
      showCards(items);   // progressive render
      setProg((fi + 1) / n);
    }

    // persist the set (all uploaded urls)
    const up = items.filter(i => i.url);
    if (!cfg.blobEnabled) setStatus('Готово. Blob не подключён — скачайте локально.');
    else if (up.length) {
      try {
        const rec = await fetch('/api/cine', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lat, lng, dur: m.timeline[m.timeline.length - 1].outEnd, title: m.destination.name, items: up.map(i => ({ format: i.fmt, url: i.url })) }) }).then(r => r.json());
        setStatus((up.length === n ? 'Готово · ' : 'Загружено ' + up.length + '/' + n + ' · ') + (rec.id ? 'набор: /api/cine/' + rec.id : ''));
      } catch (e) {}
    } else setStatus('Не удалось загрузить: ' + (lastErr || 'ошибка сервера') + ' — файлы можно скачать ниже.');
  } catch (e) { setStatus('Ошибка: ' + (e.message || e)); log(String(e)); }
  $('#go').disabled = false;
}

// Resolve ?cam=<id> -> lat/lng/title (+ livecam if the embed is a direct media URL) from the snapshot.
async function resolveCam() {
  const cam = qs.get('cam'); if (!cam) return;
  try {
    const snap = await fetch('/api/cameras/snapshot', { credentials: 'include' }).then(r => r.ok ? r.json() : null);
    const c = ((snap && snap.cameras) || []).find(x => x.id === cam);
    if (c) {
      if (!$('#lat').value) $('#lat').value = c.lat;
      if (!$('#lng').value) $('#lng').value = c.lng;
      if (!$('#title').value) $('#title').value = c.title || [c.city, c.country].filter(Boolean).join(', ');
      // livecam segment needs a fetchable mp4/HLS: prefer the camera's clipUrl, else embed if it's direct media.
      if (!$('#livecam').value) {
        const media = c.clipUrl || ((c.embed && /\.(mp4|m3u8)(\?|$)/i.test(c.embed)) ? c.embed : '');
        if (media) $('#livecam').value = media;
      }
    }
  } catch (e) { /* ignore */ }
}

$('#go').onclick = run;
(async function init() {
  const csId = qs.get('clipset');
  if (csId) {
    try {
      const j = await fetch('/api/reels/clipset/' + encodeURIComponent(csId)).then(r => r.ok ? r.json() : null);
      if (j && j.clips && j.clips.length) { presetClips = j.clips; log('клипсет ' + csId + ': ' + presetClips.length + ' клипов'); }
      else log('клипсет ' + csId + ' пуст/просрочен');
    } catch (e) { log('клипсет не загрузился: ' + (e.message || e)); }
  }
  if (presetClips.length) $('#clips').value = presetClips.map(c => c.url).join('\n');
  await resolveCam();
  if (qs.get('auto') === '1') setTimeout(run, 800);
})();
</script>
