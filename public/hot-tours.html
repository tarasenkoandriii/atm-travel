<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Горящие туры · ATM-travel.org</title>
<meta name="description" content="Горящие туры по направлениям: актуальные цены, даты вылета и подборки предложений.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.5.0/css/flag-icons.min.css">
<style>
  :root{--bg:#070c12;--panel:#0b131c;--line:#1b2734;--text:#e7eef4;--muted:#7d8b99;--cyan:#4fd7e0;--cyan-dim:#256e74;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:16px/1.55 system-ui,-apple-system,'Segoe UI',sans-serif;}
  .wrap{max-width:860px;margin:0 auto;padding:22px 16px 70px;}
  .top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .brand{font-weight:800;color:var(--cyan);letter-spacing:.3px;} .sub{color:var(--muted);font-size:13px;}
  a.plain{color:var(--cyan);text-decoration:none;}
  h1{font-size:22px;margin:18px 0 4px;}
  .acc{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
  .panel{border:1px solid var(--line);background:var(--panel);border-radius:14px;overflow:hidden;}
  .phead{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:transparent;border:0;color:var(--text);
    padding:16px 16px;cursor:pointer;font:inherit;}
  .phead .fi{width:46px;height:32px;border-radius:5px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.35);flex:0 0 auto;}
  .phead .ct{flex:1;min-width:0;}
  .phead .cname{font-size:23px;font-weight:800;line-height:1.15;}
  .phead .cmeta{font-family:ui-monospace,'Space Mono',monospace;font-size:12px;color:var(--muted);margin-top:3px;}
  .phead .cnt{font-family:ui-monospace,'Space Mono',monospace;font-size:12px;color:var(--cyan);border:1px solid var(--cyan-dim);
    border-radius:999px;padding:3px 10px;flex:0 0 auto;}
  .phead .car{color:var(--muted);transition:transform .18s;flex:0 0 auto;}
  .panel.open .phead .car{transform:rotate(180deg);}
  .plist{display:none;padding:0 16px 8px;}
  .panel.open .plist{display:block;}
  .art{display:flex;gap:12px;align-items:center;border-top:1px solid var(--line);padding:12px 2px;text-decoration:none;color:var(--text);}
  .art:hover .ah{color:var(--cyan);}
  .art-thumb{width:92px;height:64px;object-fit:cover;border-radius:9px;flex:0 0 auto;}
  .art-body{min-width:0;flex:1;}
  .art .ah{font-size:15px;font-weight:600;}
  .art .am{font-family:ui-monospace,'Space Mono',monospace;font-size:12px;color:var(--muted);margin-top:3px;}
  .art .am b{color:var(--cyan);}
  .empty{color:var(--muted);padding:26px 4px;}
  .foot{color:var(--muted);font-size:12px;margin-top:22px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><span class="brand">ATM·travel</span> <span class="sub">· горящие туры</span></div>
    <a class="plain" href="/">← на главную</a>
  </div>
  <h1>Горящие туры по направлениям</h1>
  <div class="sub">Актуальные цены и даты вылета. Ссылки на бронирование — партнёрские.</div>
  <div class="acc" id="acc"><div class="empty">Загрузка…</div></div>
  <div class="foot" id="foot"></div>
</div>

<script>
var esc = function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };
var FX = { USD: 41.5, EUR: 45.0 };
function money(n){ return n==null?'—':Number(n).toLocaleString('uk-UA')+' грн'; }
function refNote(uah){ if(uah==null) return ''; var u=Math.round(Number(uah)/FX.USD).toLocaleString('en-US'); var e=Math.round(Number(uah)/FX.EUR).toLocaleString('en-US'); return '≈ $'+u+' · ≈ €'+e; }
function dm(d){ if(!d) return ''; var x=new Date(d); return x.toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit'}); }
function dateRange(a,b){ if(!a) return ''; var s=dm(a); return b && dm(b)!==s ? (s+'–'+dm(b)) : s; }
function priceRange(min,max){ if(min==null) return ''; var base=(max && max!==min) ? ('от '+money(min).replace(' грн','')+' до '+money(max)) : ('от '+money(min)); return base+' · '+refNote(min); }

fetch('/api/hot-tours').then(function(r){return r.ok?r.json():null;}).then(function(j){
  var acc = document.getElementById('acc');
  if(j && j.fx){ if(j.fx.USD) FX.USD=j.fx.USD; if(j.fx.EUR) FX.EUR=j.fx.EUR; }
  var list = (j && j.countries) || [];
  if(!list.length){ acc.innerHTML = '<div class="empty">Пока нет опубликованных туров. Загляните позже.</div>'; return; }
  acc.innerHTML = list.map(function(c){
    var arts = (c.articles||[]).map(function(a){
      var thumb=a.image?'<img class="art-thumb" src="'+esc(a.image)+'" alt="'+esc(a.imageAlt||a.city)+'" loading="lazy">':'';
      return '<a class="art" href="/hot-tours/'+encodeURIComponent(a.slug)+'">'+thumb+
        '<div class="art-body"><div class="ah">'+esc(a.h1)+'</div>'+
        '<div class="am">'+esc(a.city)+' · '+esc(a.hotel)+' · '+(a.stars||0)+'★ · '+(a.nights||'')+' ноч. · вылет '+dm(a.departureDate)+' · <b>'+money(a.priceUAH)+'</b> <span style="color:var(--muted)">'+refNote(a.priceUAH)+'</span></div></div>'+
        '</a>';
    }).join('');
    var flag = c.cc ? '<span class="fi fi-'+esc(c.cc)+'"></span>' : '<span class="fi" style="background:#12233a"></span>';
    return '<div class="panel"><button type="button" class="phead">'+flag+
      '<span class="ct"><div class="cname">'+esc(c.country)+'</div>'+
      '<div class="cmeta">'+priceRange(c.priceMin,c.priceMax)+' · '+dateRange(c.dateMin,c.dateMax)+'</div></span>'+
      '<span class="cnt">'+c.count+'</span><span class="car">▾</span></button>'+
      '<div class="plist">'+arts+'</div></div>';
  }).join('');
  // accordion toggle (single open at a time)
  acc.addEventListener('click', function(e){
    var h = e.target.closest('.phead'); if(!h) return;
    var panel = h.parentNode, wasOpen = panel.classList.contains('open');
    [].forEach.call(acc.querySelectorAll('.panel.open'), function(p){ p.classList.remove('open'); });
    if(!wasOpen) panel.classList.add('open');
  });
  // open the first panel by default
  var first = acc.querySelector('.panel'); if(first) first.classList.add('open');
}).catch(function(){ document.getElementById('acc').innerHTML='<div class="empty">Не удалось загрузить.</div>'; });
</script>
</body>
</html>
